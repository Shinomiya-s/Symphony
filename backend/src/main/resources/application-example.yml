spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/symphony?characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.qzh.symphony.DAO

symphony:
  jwt:
    secret: ${JWT_SECRET}
    expire: 259200

dify:
  api:
    url: "https://api.dify.ai/v1/chat-messages"
    key: ${DIFY_API_KEY}